<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Focus Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animate"></div>
    <nav class="glass-nav">
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="planner.html">Планировщик</a>
            <a href="productivity.html">Калькулятор</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="tips.html">Рекомендации</a>
            <a href="contact.html" class="active">Контакты</a>
        </div>
    </nav>
    <main class="container fade-in">
        <section class="glass-card form-container">
            <h2 class="gradient-text">Связаться с нами</h2>
            <form id="contact-form" class="styled-form">
                <input type="text" id="user-name" placeholder="Твое имя" required>
                <input type="email" id="user-email" placeholder="E-mail" required>
                <textarea id="user-msg" placeholder="Твое сообщение..." rows="5"></textarea>
                <button type="submit" class="btn-primary">Отправить ракету</button>
            </form>
            <div id="form-status" class="status-msg"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
