<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планировщик - Focus Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animate"></div>
    <nav class="glass-nav">
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="planner.html" class="active">Планировщик</a>
            <a href="productivity.html">Калькулятор</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="tips.html">Рекомендации</a>
            <a href="contact.html">Контакты</a>
        </div>
    </nav>
    <main class="container fade-in">
        <section class="glass-card">
            <h2 class="gradient-text">Планировщик задач</h2>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Что нужно сделать?">
                <select id="task-category">
                    <option value="Работа">Работа</option>
                    <option value="Учеба">Учеба</option>
                    <option value="Отдых">Отдых</option>
                </select>
                <select id="task-priority">
                    <option value="Низкий">Низкий</option>
                    <option value="Средний">Средний</option>
                    <option value="Высокий">Высокий</option>
                </select>
                <button onclick="addTask()" class="btn-primary">Добавить</button>
            </div>
            <ul id="task-list" class="styled-list"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
