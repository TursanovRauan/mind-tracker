<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro - Focus Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animate"></div>
    <nav class="glass-nav">
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="planner.html">Планировщик</a>
            <a href="productivity.html">Калькулятор</a>
            <a href="pomodoro.html" class="active">Pomodoro</a>
            <a href="tips.html">Рекомендации</a>
            <a href="contact.html">Контакты</a>
        </div>
    </nav>
    <main class="container fade-in">
        <section class="glass-card pomodoro-engine">
            <h2 class="gradient-text">Таймер Pomodoro</h2>
            <div id="pomo-display" class="timer-display">25:00</div>
            <div class="pomo-settings">
                <div class="setting-item">
                    <label>Работа</label>
                    <input type="number" id="work-time" value="25">
                </div>
                <div class="setting-item">
                    <label>Отдых</label>
                    <input type="number" id="break-time" value="5">
                </div>
            </div>
            <div class="controls">
                <button onclick="startPomo()" class="btn-start">Старт</button>
                <button onclick="pausePomo()" class="btn-pause">Пауза</button>
                <button onclick="resetPomo()" class="btn-reset">Сброс</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
