<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Focus Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animate"></div>
    <nav class="glass-nav">
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="planner.html">Планировщик</a>
            <a href="productivity.html" class="active">Калькулятор</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="tips.html">Рекомендации</a>
            <a href="contact.html">Контакты</a>
        </div>
    </nav>
    <main class="container fade-in">
        <section class="glass-card centered">
            <h2 class="gradient-text">Калькулятор продуктивности</h2>
            <div class="calc-inputs">
                <div class="field">
                    <label>Часы работы</label>
                    <input type="number" id="prod-work" placeholder="0">
                </div>
                <div class="field">
                    <label>Часы отдыха</label>
                    <input type="number" id="prod-rest" placeholder="0">
                </div>
                <button onclick="calculateProductivity()" class="btn-primary">Рассчитать КПД</button>
            </div>
            <div id="calc-result" class="result-badge"></div>
            <canvas id="prod-chart" width="200" height="200"></canvas>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
